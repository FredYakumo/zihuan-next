services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ./redis/data:/data
    command:
      - redis-server
      - --protected-mode
      - 'no'
      - --save
      - ''
      - --appendonly
      - 'no'

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_local
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    command:
      - --console-enable
      - /data

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.5
    restart: unless-stopped
    ports:
      - '8080:8080'
      - '50051:50051'
    environment:
      QUERY_DEFAULTS_LIMIT: '25'
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      DISK_USE_WARNING_PERCENTAGE: '80'
      DISK_USE_READONLY_PERCENTAGE: '95'
    volumes:
      - weaviate_data:/var/lib/weaviate

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    ports:
      - '3001:3001'
      - '6099:6099'
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/ntqq:/app/.config/QQ

  zihuan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zihuan_next
    restart: unless-stopped
    ports:
      - '9951:9951'
    environment:
      ZIHUAN_HOST: '0.0.0.0'
      ZIHUAN_PORT: '9951'
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    depends_on:
      - redis
      - weaviate

volumes:
  rustfs_data:
    name: rustfs_data
  rustfs_logs:
    name: rustfs_logs
  weaviate_data:
    name: weaviate_data
